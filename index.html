<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c10;--s1:#0f1419;--s2:#161d26;
  --border:#1e2a38;--border2:#2a3d52;
  --orange:#ff6b2b;--green:#00e676;--blue:#29b6f6;
  --yellow:#ffd740;--purple:#c084fc;--red:#ff5252;
  --text:#e8edf2;--muted:#5a7a96;--mid:#8aaccc;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI'$sans-serif;font-size:15px}
body{display:flex;flex-direction:column}

/* â”€â”€ HEADER â”€â”€ */
#header{
  padding:calc(var(--safe-top) + 14px) 16px 12px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.app-title{font-weight:900;font-size:28px;line-height:1;letter-spacing:-0.5px}
.app-title span{color:var(--orange)}
.xp-box{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:8px 12px;text-align:right;min-width:130px}
.xp-level{font-size:9px;font-family:monospace;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:3px}
.xp-val{font-size:18px;font-weight:800;color:var(--yellow);margin-bottom:5px}
.xp-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--orange));border-radius:2px;transition:width .5s ease}

.stats-row{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:2px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:6px 10px;flex-shrink:0}
.stat-lbl{font-size:9px;font-family:monospace;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1px}
.stat-val{font-size:18px;font-weight:800}

.prog-wrap{margin-top:10px;background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:8px 12px}
.prog-labels{display:flex;justify-content:space-between;font-size:9px;font-family:monospace;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--orange));border-radius:3px;transition:width .6s ease}
.prog-miles{display:flex;justify-content:space-between;margin-top:4px}
.prog-miles span{font-size:8px;color:#2a3d52;font-family:monospace;letter-spacing:0.04em}

/* â”€â”€ TABS â”€â”€ */
#tabs{
  display:flex;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;
  background:var(--bg);scrollbar-width:none;
}
#tabs::-webkit-scrollbar{display:none}
.tab{font-size:10px;font-family:monospace;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--muted);padding:11px 13px;cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0}
.tab.active{color:var(--text);border-bottom-color:var(--orange)}
.tab-badge{background:var(--s2);border-radius:10px;padding:1px 5px;font-size:8px;color:var(--muted)}
.tab.active .tab-badge{background:rgba(255,107,43,.15);color:var(--orange)}

/* â”€â”€ SCROLL AREA â”€â”€ */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--safe-bot) + 16px)}

/* â”€â”€ LEGEND â”€â”€ */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.leg{display:flex;align-items:center;gap:4px;font-size:9px;font-family:monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
.leg-dot{width:7px;height:7px;border-radius:50%}

/* â”€â”€ PHASE HEADER â”€â”€ */
.phase-hdr{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--s1);border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
.phase-ring{flex-shrink:0}
.phase-hdr-text h2{font-size:20px;font-weight:800;line-height:1}
.phase-hdr-text p{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.phase-pct{font-family:monospace;font-size:16px;font-weight:800;margin-left:auto;flex-shrink:0}

/* â”€â”€ WEEK CARDS â”€â”€ */
.week{background:var(--s1);border:1px solid var(--border);border-radius:9px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.week.done{border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.02)}
.week.current{border-color:rgba(255,107,43,.4)}
.week-hdr{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;user-select:none}
.week-num{font-family:monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0;width:46px}
.week-date{font-size:10px;color:var(--muted);flex:1;letter-spacing:0.02em}
.week-km{font-family:monospace;font-size:15px;font-weight:800;flex-shrink:0}
.week-cnt{font-family:monospace;font-size:10px;color:var(--muted);flex-shrink:0}
.week-done-badge{background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.3);border-radius:4px;padding:2px 6px;font-size:8px;font-family:monospace;color:var(--green);letter-spacing:0.08em;flex-shrink:0}
.week-chevron{font-size:10px;color:var(--muted);flex-shrink:0;transition:transform .2s}
.week.open .week-chevron{transform:rotate(180deg)}
.week-prog{height:2px;background:var(--border);margin:0 13px}
.week-prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .4s ease}

/* â”€â”€ DAYS â”€â”€ */
.week-days{display:none;padding:6px 13px 11px;flex-direction:column;gap:4px}
.week.open .week-days{display:flex}
.day{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:6px;cursor:pointer;transition:background .1s;border:1px solid transparent}
.day:active{background:var(--s2)}
.day.checked{background:rgba(0,230,118,.05);border-color:rgba(0,230,118,.15)}
.day.is-rest{opacity:.38;cursor:default}
.day-cb{width:22px;height:22px;border:2px solid var(--border2);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;transition:all .2s;color:var(--bg)}
.day.checked .day-cb{background:var(--green);border-color:var(--green)}
.day-bar{width:3px;border-radius:2px;align-self:stretch;min-height:18px;flex-shrink:0}
.day-lbl{font-family:monospace;font-size:10px;color:var(--muted);width:26px;flex-shrink:0;letter-spacing:.04em}
.day-txt{flex:1;font-size:13px;line-height:1.35}
.day.checked .day-txt{color:var(--muted);text-decoration:line-through}
.day-km{font-family:monospace;font-size:10px;color:var(--muted);flex-shrink:0}
.day-xp{font-family:monospace;font-size:9px;color:var(--yellow);flex-shrink:0;opacity:.5}

/* â”€â”€ PACE TABLE â”€â”€ */
.pace-card{background:var(--s1);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:12px}
.pace-card table{width:100%;border-collapse:collapse;font-size:12px}
.pace-card th{font-family:monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 11px;border-bottom:1px solid var(--border);background:var(--bg)}
.pace-card td{padding:9px 11px;border-bottom:1px solid var(--s2);vertical-align:top}
.pace-card tr:last-child td{border-bottom:none}
.pace-val{font-family:monospace;font-size:13px;color:var(--yellow);font-weight:700}
.race-tip{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:12px}
.race-tip h3{font-size:16px;font-weight:800;color:var(--orange);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.race-tip p{font-size:12px;color:var(--muted);line-height:1.65}

/* â”€â”€ TOAST â”€â”€ */
#toast{position:fixed;bottom:calc(var(--safe-bot) + 16px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:9px 18px;font-family:monospace;font-size:11px;letter-spacing:.06em;z-index:999;white-space:nowrap;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* â”€â”€ ACHIEVEMENT â”€â”€ */
#ach{position:fixed;top:calc(var(--safe-top) + 12px);right:12px;background:var(--s2);border:1px solid var(--yellow);border-radius:10px;padding:14px 16px;z-index:1000;max-width:220px;transform:translateX(130%);transition:transform .45s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 24px rgba(255,215,64,.18)}
#ach.show{transform:translateX(0)}
.ach-icon{font-size:26px;margin-bottom:4px}
.ach-title{font-size:14px;font-weight:800;color:var(--yellow);margin-bottom:3px}
.ach-desc{font-size:11px;color:var(--muted);line-height:1.4}

/* â”€â”€ INSTALL BANNER â”€â”€ */
#install-tip{display:none;background:rgba(255,107,43,.08);border:1px solid rgba(255,107,43,.25);border-radius:7px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--mid);line-height:1.5}
#install-tip strong{color:var(--orange)}
#close-tip{float:right;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;margin-left:8px}
</style>
</head>
